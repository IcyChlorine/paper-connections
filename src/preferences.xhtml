<vbox id="paper-connections-prefpane">
	<vbox class="main-section">
		<groupbox>
			<label>
				<html:h2>Paper Connections</html:h2>
			</label>
			<checkbox
				id="show-selection-debug-section"
				native="true"
				preference="extensions.paper-connections.showSelectionDebugSection"
				label="Show Selection Debug section in the right item panes"
			/>
			<description>
				When enabled, the Selection Debug section appears in the right-side item panes for graph debugging.
			</description>
		</groupbox>
	</vbox>
</vbox>
