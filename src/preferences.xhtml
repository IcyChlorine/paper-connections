<vbox id="paper-connections-prefpane">
	<preferences>
		<preference
			id="paper-connections-pref-sync-selection"
			name="extensions.paper-connections.syncGraphSelectionToItems"
			type="bool"
		/>
		<preference
			id="paper-connections-pref-open-pdf"
			name="extensions.paper-connections.openNodePdfOnDoubleClick"
			type="bool"
		/>
		<preference
			id="paper-connections-pref-edge-cut-modifier"
			name="extensions.paper-connections.edgeCutModifier"
			type="string"
		/>
		<preference
			id="paper-connections-pref-edge-bundle-modifier"
			name="extensions.paper-connections.edgeBundleModifier"
			type="string"
		/>
		<preference
			id="paper-connections-pref-toggle-graph-modifier"
			name="extensions.paper-connections.toggleGraphModifier"
			type="string"
		/>
		<preference
			id="paper-connections-pref-toggle-graph-key"
			name="extensions.paper-connections.toggleGraphKey"
			type="string"
		/>
		<preference
			id="paper-connections-pref-fullscreen-key"
			name="extensions.paper-connections.fullscreenKey"
			type="string"
		/>
		<preference
			id="paper-connections-pref-show-selection-debug"
			name="extensions.paper-connections.showSelectionDebugSection"
			type="bool"
		/>

	<vbox class="main-section">
		<hbox align="center" style="margin: 2px 0 6px;">
			<separator class="thin" flex="1" style="opacity: 0.35;" />
			<label
				value="&#x5173;&#x7CFB;&#x56FE;&#x4EA4;&#x4E92;"
				style="margin: 0 10px; font-weight: 600; color: #5f6b76;"
			/>
			<separator class="thin" flex="1" style="opacity: 0.35;" />
		</hbox>

		<checkbox
			id="sync-selected-node-to-item-list"
			native="true"
			preference="paper-connections-pref-sync-selection"
			label="&#x5C06;&#x8282;&#x70B9;&#x9009;&#x62E9;&#x53CD;&#x5411;&#x540C;&#x6B65;&#x5230;&#x8BBA;&#x6587;&#x6761;&#x76EE;"
		/>

				style="min-width: 140px;"
			/>
			<menulist
				id="edge-cut-modifier"
				preference="paper-connections-pref-edge-cut-modifier"

			>
				<menupopup>
					<menuitem label="Alt" value="alt" />
					<menuitem label="Shift" value="shift" />
					<menuitem label="Ctrl" value="ctrl" />
				</menupopup>
			</menulist>
			<label value="+ &#x9F20;&#x6807;&#x53F3;&#x952E;&#x62D6;&#x62FD;" style="margin-inline-start: 8px;" />

				style="min-width: 140px;"
			/>
			<menulist
				id="edge-bundle-modifier"

				style="min-width: 92px;"
				oncommand="(function(){let other=document.getElementById('edge-cut-modifier');let note=document.getElementById('gesture-modifier-note');let options=['shift','alt','ctrl'];if(other &amp;&amp; this.value===other.value){this.value=options.find((value)=&gt;value!==other.value)||'shift';}if(note){note.textContent='&#x5207;&#x8FB9;&#x4E0E;&#x805A;&#x8FB9;&#x4E0D;&#x80FD;&#x7ED1;&#x5B9A;&#x5230;&#x540C;&#x4E00;&#x4E2A;&#x4FEE;&#x9970;&#x952E;&#x3002;';}}).call(this);"
			>
				<menupopup>
					<menuitem label="Shift" value="shift" />
					<menuitem label="Alt" value="alt" />
					<menuitem label="Ctrl" value="ctrl" />

				style="min-width: 140px;"
			/>
			<menulist
				id="toggle-graph-modifier"
				preference="paper-connections-pref-toggle-graph-modifier"
				style="min-width: 92px;"
			>

					<menuitem label="Alt" value="alt" />
				</menupopup>
			</menulist>
			<label value="+" style="margin-inline: 8px 6px;" />

				id="toggle-graph-key"
				preference="paper-connections-pref-toggle-graph-key"
				maxlength="16"
				style="width: 72px;"
			/>
		</hbox>
		<description style="font-size: 11px; color: #8a8f98; margin-inline-start: 28px; margin-top: 2px;">
			&#x9ED8;&#x8BA4;&#x4E3A; Ctrl+`&#x3002;&#x6587;&#x672C;&#x6846;&#x586B;&#x5199;&#x5355;&#x4E2A;&#x6309;&#x952E;&#x5BF9;&#x5E94;&#x7684;&#x5B57;&#x7B26;&#x4E32;&#xFF0C;&#x4F8B;&#x5982; `&#x3001;a &#x6216; A&#x3002;
