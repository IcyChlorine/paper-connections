<svg xmlns="http://www.w3.org/2000/svg" width="994" height="220" viewBox="0 0 994 220" role="img" aria-labelledby="banner-title">
  <title id="banner-title">Paper Connections</title>
  <defs>
    <linearGradient id="banner-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ACBA" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    <linearGradient id="underline-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ACBA" />
      <stop offset="100%" stop-color="#7DD3FC" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10" />
    </filter>
  </defs>

  <rect width="994" height="220" fill="#FFFFFF" rx="24" ry="24" />

  <g filter="url(#soft-shadow)">
    <rect x="24" y="24" width="946" height="172" rx="22" ry="22" fill="#F8FAFC" />
  </g>

  <rect x="24" y="24" width="10" height="172" rx="5" ry="5" fill="url(#banner-accent)" opacity="0.95" />

  <circle cx="122.0" cy="110.0" r="72" fill="#EAF8FA" />
  <circle cx="122.0" cy="110.0" r="58" fill="#FFFFFF" opacity="0.96" />
  <image href="data:image/svg+xml;base64," x="60" y="48" width="124" height="124" />

  <text
    x="220"
    y="118"
    fill="#0F172A"
    font-family="'Avenir Next', 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-1.4"
  >Paper Connections</text>

  <rect x="220" y="136" width="420" height="8" rx="4" ry="4" fill="url(#underline-accent)" />

  <g fill="#94A3B8" opacity="0.55">
    <circle cx="228" cy="166" r="4" />
    <circle cx="250" cy="166" r="4" />
    <circle cx="272" cy="166" r="4" />
  </g>
</svg>
